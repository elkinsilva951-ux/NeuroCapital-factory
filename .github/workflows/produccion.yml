name: Produccion Automatizada 10x
on:
  schedule:
    - cron: '0 */2 * * *' # Se ejecuta cada 2 horas (Aprox 10-12 videos al día)
  workflow_dispatch: # Esto nos permite probarlo manualmente ahora mismo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Configurar Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias profesionales
        run: |
          pip install requests moviepy
          # Instalamos ImageMagick para que MoviePy pueda procesar textos si es necesario
          sudo apt-get install imagemagick

      - name: Ejecutar Fabrica de Videos
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python main.py
