name: Produccion Automatizada 10x
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # Linea vital para permitir que la IA escriba texto en los videos:
          sudo sed -i 's/domain="path" rights="none" pattern="@\"/domain="path" rights="read|write" pattern="@\"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Packages
        run: |
          pip install requests moviepy imageio-ffmpeg
          python -c "import imageio; imageio.plugins.ffmpeg.download()"

      - name: Run Factory
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python main.py
